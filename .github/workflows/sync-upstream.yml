name: Sync upstream and rebuild custom branch

on:
  schedule:
    # Run nightly at 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add and fetch upstream
        run: |
          git remote add upstream https://github.com/pfsensible/core.git
          git fetch upstream master
          git fetch origin \
            fix/dns-resolver-alias-misassignment \
            feature/vip-module

      - name: Rebase feature branches onto upstream/master
        run: |
          BRANCHES=(
            "fix/dns-resolver-alias-misassignment"
            "feature/vip-module"
          )

          for branch in "${BRANCHES[@]}"; do
            echo "::group::Rebasing $branch"
            git checkout -B "$branch" "origin/$branch"

            if git merge-base --is-ancestor upstream/master "$branch"; then
              echo "$branch is already up to date with upstream/master"
            elif ! git rebase upstream/master; then
              git rebase --abort
              echo "::error::Rebase conflict on $branch - manual rebase needed"
              exit 1
            fi

            git push origin "$branch" --force-with-lease
            echo "::endgroup::"
          done

      - name: Rebuild custom branch
        run: |
          git checkout -B custom upstream/master

          BRANCHES=(
            "fix/dns-resolver-alias-misassignment"
            "feature/vip-module"
          )

          for branch in "${BRANCHES[@]}"; do
            echo "Merging $branch..."
            if ! git merge --no-ff "$branch" -m "Merge $branch into custom"; then
              echo "::error::Merge conflict merging $branch - manual rebase needed"
              exit 1
            fi
          done

          git push origin custom --force-with-lease
